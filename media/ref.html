<div id="mobile-section" class="mobile-section">
    <div class="mobile-landspace-message">

</div>

<div class="show">
    <span id="lang-span" class="lang-span" style="right:50px;position: absolute;z-index: 1;top: 10px;"><font color="#fff"><a href="../showroom/en.html"><font color="#fff">English</font></a> │ <a href="../showroom/tw.html"><font color="#fff">中文</font></a></font></span>

</div>
